StylesPath = .vale
MinAlertLevel = warning
Vocab = krav
Packages = https://github.com/errata-ai/Google/releases/download/v0.6.3/Google.zip, https://github.com/errata-ai/write-good/releases/download/v0.4.1/write-good.zip, https://github.com/errata-ai/proselint/releases/download/v0.3.4/proselint.zip, https://github.com/tbhb/vale-ai-tells/releases/download/v1.4.0/ai-tells.zip

[*.md]
BasedOnStyles = Vale, Google, krav, write-good, proselint, ai-tells
Google.Headings = NO
Google.Colons = NO
# Use krav.TooWordy (forked from write-good.TooWordy with domain terms removed)
write-good.TooWordy = NO

# Community and policy documents use conversational tone
[{CODE_OF_CONDUCT.md,CONTRIBUTING.md,README.md,SECURITY.md,.github/pull_request_template.md}]
BasedOnStyles = Vale, Google, krav, write-good, proselint, ai-tells
Google.Headings = NO
Google.FirstPerson = NO
Google.Will = NO
proselint.Annotations = NO
write-good.TooWordy = NO

# Design documents use technical/domain vocabulary
[docs/design/**/*.md]
BasedOnStyles = Vale, Google, krav, write-good, proselint, ai-tells
Google.Headings = NO
write-good.TooWordy = NO
krav.TooWordy = NO

# Requirements and specifications use formal tone (shall, must, should, etc.)
[.krav/**/*.md]
BasedOnStyles = Vale, Google, krav, write-good, proselint, ai-tells
Google.Headings = NO
write-good.TooWordy = NO
krav.TooWordy = NO
ai-tells.FormalRegister = NO

# Plans use technical/domain vocabulary
[docs/plans/**/*.md]
BasedOnStyles = Vale, Google, krav, write-good, proselint, ai-tells
Google.Headings = NO
write-good.TooWordy = NO
krav.TooWordy = NO
ai-tells.FormalRegister = NO

[{.claude/**/*.md,**/CLAUDE.md}]
BasedOnStyles = Vale, Google, krav, write-good, proselint, ai-tells
Google.Headings = NO
write-good.TooWordy = NO
krav.TooWordy = NO

# Internal/temporary files - skip linting
[{.vale/**/*.md,tmp/**/*.md}]
BasedOnStyles =
