---
extends: capitalization
message: "'%s' should use sentence-style capitalization."
link: "https://developers.google.com/style/capitalization#capitalization-in-titles-and-headings"
level: warning
scope: heading
match: $sentence
indicators:
  - ":"
exceptions:
  - ARCI
  - Azure
  - CEL
  - CLI
  - Claude
  - CRUD
  - DAG
  - Code
  - I/O
  - Cosmos
  - Docker
  - Dockerfile
  - Emmet
  - GritQL
  - gRPC
  - I
  - JSON
  - Kubernetes
  - Linux
  - macOS
  - Marketplace
  - MCP
  - MongoDB
  - PagerDuty
  - React
  - REPL
  - SQL
  - Starlark
  - Studio
  - TypeScript
  - URLs
  - Visual
  - VS
  - Windows
