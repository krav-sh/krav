#
#     return ParamsResponse(
#         params=params,
#         ttl=30,  # Cache for 30 seconds
#         cache_key=f"{session.id}:{project.branch}"
#     )

# ============================================================================
# Caching and performance
# ============================================================================
#
# To minimize latency, arci can cache params:
#
# - Use cache_key from response for cache lookup
# - Respect ttl for cache expiration
# - Pre-warm cache on session start
# - Invalidate on branch switch or significant events
#
# The specs subsystem can also push param updates proactively:
#
# POST /arci/params/invalidate
# {
#   "cache_keys": ["sess_abc123:*"],
#   "reason": "workflow_phase_changed"
# }

# ============================================================================
# Error handling
# ============================================================================
#
# If the specs subsystem returns an error or times out:
#
# 1. arci uses defaults from ParamProvider.spec.defaults
# 2. Policy evaluation continues with degraded context
# 3. Audit log records that params came from defaults
# 4. Optional: notify user that full context unavailable
#
# The specs subsystem should return partial params rather than error when possible:
#
# HTTP 200 OK (partial)
# {
#   "params": {
#     "projectType": "unknown",  // Couldn't determine
#     "strictMode": true,        // Default to strict when uncertain
#     "workflowPhase": "none"
#   },
#   "warnings": ["Could not determine project type from pyproject.toml"]
# }
